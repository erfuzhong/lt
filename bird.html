<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #71c5cf;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            z-index: 10;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0 #000;
        }

        .score-display {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 0 #000;
        }

        .tap-hint {
            font-size: 12px;
            margin-top: 10px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #score {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #000;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="score">0</div>
    
    <div id="startScreen">
        <h1>🐦 Flappy Bird</h1>
        <p class="tap-hint">点击屏幕开始</p>
    </div>

    <div id="gameOverScreen">
        <h1>游戏结束</h1>
        <p>得分: <span id="finalScore" class="score-display">0</span></p>
        <p>最高: <span id="bestScore" class="score-display">0</span></p>
        <p class="tap-hint">点击重新开始</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const bestScoreEl = document.getElementById('bestScore');

        // 设置画布尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 游戏配置 - 为小屏幕优化
        const config = {
            gravity: 0.25,        // 降低重力
            jumpForce: -4.5,      // 降低跳跃力度
            pipeSpeed: 1.5,       // 降低管道速度
            pipeGap: 70,          // 增大管道间隙
            pipeWidth: 35,
            birdSize: 15,
            pipeSpacing: 120      // 管道间距
        };

        // 游戏状态
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let bestScore = localStorage.getItem('flappyBest') || 0;
        bestScoreEl.textContent = bestScore;

        // 小鸟
        const bird = {
            x: 40,
            y: canvas.height / 2,
            velocity: 0,
            rotation: 0
        };

        // 管道数组
        let pipes = [];

        // 云朵装饰
        let clouds = [];
        for (let i = 0; i < 3; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.4,
                size: 15 + Math.random() * 10
            });
        }

        // 重置游戏
        function resetGame() {
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes = [];
            score = 0;
            scoreEl.textContent = '0';
        }

        // 添加管道
        function addPipe() {
            const minY = 40;
            const maxY = canvas.height - config.pipeGap - 40;
            const gapY = minY + Math.random() * (maxY - minY);
            
            pipes.push({
                x: canvas.width,
                gapY: gapY,
                scored: false
            });
        }

        // 小鸟跳跃
        function jump() {
            if (gameState === 'start') {
                gameState = 'playing';
                startScreen.style.display = 'none';
                addPipe();
            } else if (gameState === 'playing') {
                bird.velocity = config.jumpForce;
            } else if (gameState === 'gameover') {
                gameOverScreen.style.display = 'none';
                resetGame();
                gameState = 'playing';
                addPipe();
            }
        }

        // 更新游戏
        function update() {
            if (gameState !== 'playing') return;

            // 更新小鸟
            bird.velocity += config.gravity;
            bird.y += bird.velocity;
            bird.rotation = Math.min(bird.velocity * 3, 45);

            // 边界检测
            if (bird.y < 0) {
                bird.y = 0;
                bird.velocity = 0;
            }
            if (bird.y > canvas.height - config.birdSize) {
                gameOver();
                return;
            }

            // 更新管道
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= config.pipeSpeed;

                // 计分
                if (!pipes[i].scored && pipes[i].x + config.pipeWidth < bird.x) {
                    pipes[i].scored = true;
                    score++;
                    scoreEl.textContent = score;
                }

                // 移除屏幕外管道
                if (pipes[i].x < -config.pipeWidth) {
                    pipes.splice(i, 1);
                }

                // 碰撞检测
                if (checkCollision(pipes[i])) {
                    gameOver();
                    return;
                }
            }

            // 添加新管道
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - config.pipeSpacing) {
                addPipe();
            }

            // 更新云朵
            clouds.forEach(cloud => {
                cloud.x -= 0.3;
                if (cloud.x < -30) {
                    cloud.x = canvas.width + 30;
                    cloud.y = Math.random() * canvas.height * 0.4;
                }
            });
        }

        // 碰撞检测
        function checkCollision(pipe) {
            const birdLeft = bird.x - config.birdSize / 2;
            const birdRight = bird.x + config.birdSize / 2;
            const birdTop = bird.y - config.birdSize / 2;
            const birdBottom = bird.y + config.birdSize / 2;

            const pipeLeft = pipe.x;
            const pipeRight = pipe.x + config.pipeWidth;

            // 检测是否在管道X范围内
            if (birdRight > pipeLeft && birdLeft < pipeRight) {
                // 检测是否碰到上管道或下管道
                if (birdTop < pipe.gapY || birdBottom > pipe.gapY + config.pipeGap) {
                    return true;
                }
            }
            return false;
        }

        // 游戏结束
        function gameOver() {
            gameState = 'gameover';
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBest', bestScore);
            }
            finalScoreEl.textContent = score;
            bestScoreEl.textContent = bestScore;
            gameOverScreen.style.display = 'flex';
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#71c5cf';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制云朵
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            clouds.forEach(cloud => {
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.8, cloud.y - cloud.size * 0.3, cloud.size * 0.7, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 1.5, cloud.y, cloud.size * 0.8, 0, Math.PI * 2);
                ctx.fill();
            });

            // 绘制地面
            ctx.fillStyle = '#ded895';
            ctx.fillRect(0, canvas.height - 15, canvas.width, 15);
            ctx.fillStyle = '#33a033';
            ctx.fillRect(0, canvas.height - 18, canvas.width, 5);

            // 绘制管道
            pipes.forEach(pipe => {
                // 上管道
                ctx.fillStyle = '#73bf2e';
                ctx.fillRect(pipe.x, 0, config.pipeWidth, pipe.gapY);
                ctx.fillStyle = '#5aa020';
                ctx.fillRect(pipe.x - 3, pipe.gapY - 15, config.pipeWidth + 6, 15);

                // 下管道
                ctx.fillStyle = '#73bf2e';
                ctx.fillRect(pipe.x, pipe.gapY + config.pipeGap, config.pipeWidth, canvas.height - pipe.gapY - config.pipeGap);
                ctx.fillStyle = '#5aa020';
                ctx.fillRect(pipe.x - 3, pipe.gapY + config.pipeGap, config.pipeWidth + 6, 15);
            });

            // 绘制小鸟
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation * Math.PI / 180);

            // 身体
            ctx.fillStyle = '#f7dc6f';
            ctx.beginPath();
            ctx.ellipse(0, 0, config.birdSize, config.birdSize * 0.8, 0, 0, Math.PI * 2);
            ctx.fill();

            // 翅膀
            ctx.fillStyle = '#f4d03f';
            ctx.beginPath();
            ctx.ellipse(-3, 2, config.birdSize * 0.5, config.birdSize * 0.35, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // 眼睛
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(5, -3, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(6, -3, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // 嘴巴
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(10, 0);
            ctx.lineTo(18, 2);
            ctx.lineTo(10, 5);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 事件监听
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        }, { passive: false });

        document.addEventListener('click', jump);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') jump();
        });

        // 开始游戏
        gameLoop();
    </script>
</body>
</html>
